name: Download File

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Direct file URL'
        required: true
        type: string
      password:
        description: 'Encryption password for the split archive'
        required: true
        type: string
      filename:
        description: 'Custom name for the downloaded file (e.g., myfile.zip)'
        required: false
        default: ''
        type: string
      split_size:
        description: 'Size of each split part (e.g., 100m, 200m)'
        required: false
        default: '99m'
        type: string
      output_dir:
        description: 'Directory where split parts will be stored (created if missing)'
        required: false
        default: 'splits'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install 7-Zip
      run: sudo apt-get update && sudo apt-get install -y p7zip-full

    - name: Download single file
      run: |
        if [ -z "${{ inputs.filename }}" ]; then
          curl -JLO "${{ inputs.url }}"
          DOWNLOADED_FILE=$(ls -t | head -n1)
        else
          DOWNLOADED_FILE="${{ inputs.filename }}"
          curl -L -o "$DOWNLOADED_FILE" "${{ inputs.url }}"
        fi
        echo "DOWNLOADED_FILE=$DOWNLOADED_FILE" >> $GITHUB_ENV

    - name: Create split encrypted archive
      env:
        ARCHIVE_PASSWORD: ${{ inputs.password }}
        SPLIT_SIZE: ${{ inputs.split_size }}
      run: |
        echo "Splitting and encrypting: $DOWNLOADED_FILE"
        7z a -t7z -v"$SPLIT_SIZE" -p"$ARCHIVE_PASSWORD" -mhe=on $DOWNLOADED_FILE.7z "$DOWNLOADED_FILE"
        rm "$DOWNLOADED_FILE"

    - name: Move split archives to target directory
      run: |
        TARGET_DIR="${{ inputs.output_dir }}"
        mkdir -p "$TARGET_DIR"
        mv $DOWNLOADED_FILE.7z.* "$TARGET_DIR/"

    - name: Commit and Push split files inside the directory
      run: |
        git config --global user.name "${{ github.actor }}"
        git config --global user.email "${{ github.actor }}@users.noreply.github.com"
        git add "${{ inputs.output_dir }}"
        git commit -m "Add split encrypted archive in ${{ inputs.output_dir }}" || echo "No changes to commit"
        git push
